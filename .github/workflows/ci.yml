name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --locked

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            alias: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            alias: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build artifacts
        run: |
          chmod +x scripts/build-artifacts.sh
          scripts/build-artifacts.sh "${{ matrix.target }}" "${{ matrix.alias }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.alias }}
          path: |
            dist/bluetty-${{ matrix.alias }}
            dist/bluetty-${{ matrix.alias }}.tar.gz
            dist/bluetty-${{ matrix.alias }}.tar.gz.sha256
          if-no-files-found: error

  package:
    runs-on: ubuntu-latest
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Normalize dist layout
        run: |
          find dist -type f -name 'bluetty-*' -exec cp {} dist/ \;

      - name: Package artifacts
        run: |
          chmod +x scripts/package-artifacts.sh
          scripts/package-artifacts.sh "${{ matrix.arch }}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.arch }}
          path: |
            dist/bluetty-*-linux-${{ matrix.arch }}
            dist/bluetty-*-linux-${{ matrix.arch }}.deb
            dist/bluetty-*-linux-${{ matrix.arch }}.rpm
          if-no-files-found: error
