name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            alias: amd64
            package_arch: amd64
          - target: aarch64-unknown-linux-musl
            alias: arm64
            package_arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build artifacts
        run: |
          chmod +x scripts/build-artifacts.sh
          scripts/build-artifacts.sh "${{ matrix.target }}" "${{ matrix.alias }}"

      - name: Package artifacts
        run: |
          chmod +x scripts/package-artifacts.sh
          scripts/package-artifacts.sh "${{ matrix.package_arch }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.alias }}
          path: |
            dist/bluetty-${{ matrix.alias }}
            dist/bluetty-${{ matrix.alias }}.tar.gz
            dist/bluetty-${{ matrix.alias }}.tar.gz.sha256
            dist/bluetty-*-linux-${{ matrix.package_arch }}
            dist/bluetty-*-linux-${{ matrix.package_arch }}.deb
            dist/bluetty-*-linux-${{ matrix.package_arch }}.rpm
          if-no-files-found: error
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}
  publish:
    runs-on: ubuntu-latest
    needs:
      - build-and-package
      - changelog
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts

      - name: Flatten artifact directory
        run: |
          mkdir -p dist
          find release-artifacts -type f -exec cp {} dist/ \;
          ls -lh dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body: ${{ needs.changelog.outputs.release_body }}
          files: |
            dist/*
